<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ZhuZhu · Brand · 03</title>
<link rel="stylesheet" href="../shared.css"/>
<style>
  /* Slogan slide — typographic explosion, vertical rhythm. */
  .body { padding: 130px 96px 110px; display: flex; flex-direction: column; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; }

  .stage { margin-top: 60px; display: flex; flex-direction: column; align-items: flex-start; }
  .marks { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 160px; line-height: 0.5; color: var(--gold); opacity: 0.5; height: 40px; }
  .ka-big { font-family: var(--ka); font-style: italic; font-weight: 500; font-size: 156px; line-height: 1.0; color: var(--bone); letter-spacing: -0.02em; margin-top: 60px; }
  .ka-big em { color: var(--gold-bright); font-style: italic; }
  .dot-end { color: var(--gold-bright); font-style: normal; }

  .below { margin-top: 70px; display: grid; grid-template-columns: 1fr 1.1fr; gap: 50px; align-items: start; }
  .below .label { font-family: var(--body); font-size: 12px; text-transform: uppercase; letter-spacing: 0.32em; color: var(--ash); font-weight: 600; margin-bottom: 16px; }
  .below .ipa { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 30px; color: var(--bone-warm); }
  .below .gloss { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 30px; line-height: 1.4; color: var(--bone); letter-spacing: -0.005em; }
  .below .gloss em { color: var(--gold-bright); font-style: italic; }
  .below .gloss .reg { font-style: normal; font-weight: 400; }

  .foot { margin-top: auto; padding-top: 30px; border-top: 1px solid rgba(227,183,109,0.22); display: flex; justify-content: space-between; align-items: center; }
  .foot .l { font-family: var(--body); font-size: 12px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--ash); font-weight: 600; }
  .foot .r { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 20px; color: var(--bone-warm); }
</style>
</head>
<body>
<div class="slide">
  <div class="frame"></div>
  <div class="body">
    <div class="top"><span class="eyebrow">the word</span></div>
    <div class="stage">
      <div class="marks">“</div>
      <h1 class="ka-big ka">შე<em>ჟუჟუ</em>ნდი<span class="dot-end">.</span></h1>
    </div>
    <div class="below">
      <div>
        <div class="label">pronunciation</div>
        <div class="ipa">she-zhu-zhu-ndi</div>
      </div>
      <div>
        <div class="label">meaning</div>
        <div class="gloss"><span class="reg">verb</span> — get <em>tipsy</em>, the boogie way.</div>
      </div>
    </div>
    <div class="foot"><span class="l">a Georgian word for joy</span><span class="r">— our slogan</span></div>
  </div>
</div>
</body>
</html>

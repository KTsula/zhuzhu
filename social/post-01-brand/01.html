<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ZhuZhu · Brand · 01</title>
<link rel="stylesheet" href="../shared.css"/>
<style>
  /* Cover slide — centered hero, ჟუჟუ in big italic Georgian. */
  .body { align-items: center; justify-content: center; text-align: center; padding: 110px 96px 110px; }
  .mark-hero { width: 560px; height: 560px; background: url("../assets/logo-transparent.png") center/contain no-repeat; margin-bottom: -10px; }
  .ka-tagline { font-family: var(--ka); font-style: italic; font-weight: 500; font-size: 80px; line-height: 1.0; color: var(--bone); letter-spacing: -0.005em; }
  .ka-tagline em { color: var(--gold-bright); font-style: italic; }
  .ka-tagline .stop { color: var(--gold-bright); font-style: normal; }
  .sub { margin-top: 30px; font-family: var(--display); font-style: italic; font-weight: 300; font-size: 28px; color: var(--ash); letter-spacing: 0.04em; }
  .corner { position: absolute; bottom: 100px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 18px; color: var(--ash-dim); font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 600; z-index: 4; }
  .corner .dot { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; }
</style>
</head>
<body>
<div class="slide">
  <div class="frame"></div>
  <div class="body">
    <div class="mark-hero"></div>
    <div class="ka-tagline ka">შე<em>ჟუჟუ</em>ნდი<span class="stop">.</span></div>
    <div class="sub">cocktail desserts · Tbilisi</div>
  </div>
  <div class="corner"><span>est. 2026</span><span class="dot"></span><span>hand-set</span><span class="dot"></span><span>zhuzhu.ge</span></div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ZhuZhu · Signature Three · 04 · Red Wine Berry</title>
<link rel="stylesheet" href="../shared.css"/>
<style>
  /* Cube card — wine accent, deeper feel for the closer. */
  .body { padding: 130px 90px 90px; }
  .glow-wine { position: absolute; inset: 0; background: radial-gradient(60% 50% at 50% 50%, rgba(138,31,60,0.18), transparent 65%); z-index: 0; pointer-events: none; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .cube-wrap { margin-top: 24px; max-width: 720px; margin-left: auto; margin-right: auto; }
  .meta { margin-top: -10px; position: relative; z-index: 4; padding: 0 16px; }
  .line { display: flex; align-items: center; gap: 14px; }
  .line .h { flex: 1; height: 1px; background: rgba(183,58,90,0.35); }
  .line .l { font-family: var(--body); font-size: 12px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--ash); font-weight: 600; }
  .line .l em { color: var(--wine-glow); font-style: normal; }
  .name { margin-top: 22px; font-family: var(--display); font-size: 72px; line-height: 1.0; letter-spacing: -0.02em; color: var(--bone); }
  .name .it { font-style: italic; font-weight: 300; color: var(--bone-warm); }
  .name .reg { font-weight: 400; }
  .stop { color: var(--wine-glow); }
  .ka-name { margin-top: 12px; font-family: var(--ka); font-style: italic; font-weight: 500; font-size: 30px; color: var(--wine-glow); }
  .blurb { margin-top: 22px; font-family: var(--body); font-weight: 350; font-size: 18px; line-height: 1.6; color: var(--bone-warm); max-width: 60ch; }
  .blurb em { color: var(--gold-bright); font-style: italic; }
  .foot { margin-top: auto; padding-top: 22px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(183,58,90,0.22); }
  .foot .url { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 22px; color: var(--gold-bright); letter-spacing: 0.005em; }
  .foot .tag { font-family: var(--body); font-size: 12px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--ash); font-weight: 600; }
</style>
</head>
<body>
<div class="slide">
  <div class="glow-wine"></div>
  <div class="frame"></div>
  <div class="body">
    <div class="top">
      <span class="eyebrow">სამი ხელწერა</span>
    </div>
    <div class="cube-wrap">
      <div class="cube saperavi"></div>
      <div class="glow" style="background: radial-gradient(ellipse at center, rgba(183,58,90,0.22), transparent 65%);"></div>
    </div>
    <div class="meta">
      <div class="line"><span class="l"><em>Khvanchkara</em> · Whole frozen berry · Hand-set</span><span class="h"></span></div>
      <h2 class="name"><span class="it">Red</span> <span class="reg">Wine Berry<span class="stop">.</span></span></h2>
      <p class="ka-name ka">წითელი ღვინო-კენკრა.</p>
      <p class="blurb">Khvanchkara, set firm by hand. <em>One whole frozen berry</em> placed in each cube — the only piece of fruit you'll taste whole.</p>
      <div class="foot">
        <span class="url">zhuzhu.ge</span>
        <span class="tag">Hand-set · Tbilisi</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>

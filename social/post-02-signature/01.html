<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ZhuZhu · Signature Three · 01</title>
<link rel="stylesheet" href="../shared.css"/>
<style>
  /* Cover — title left, three cube thumbnails arranged at bottom. */
  .body { padding: 130px 96px 100px; }
  .top { display: flex; align-items: center; gap: 18px; }
  .top .hair { width: 60px; height: 1px; background: var(--gold); }
  .head { margin-top: 40px; font-family: var(--display); font-size: 140px; line-height: 0.94; letter-spacing: -0.025em; }
  .head .it { font-style: italic; font-weight: 300; color: var(--bone-warm); display: block; }
  .head .reg { font-weight: 400; color: var(--bone); display: block; }
  .stop { color: var(--gold-bright); }
  .ka-sub { margin-top: 26px; font-family: var(--ka); font-style: italic; font-weight: 500; font-size: 52px; line-height: 1.05; color: var(--gold); }
  .blurb { margin-top: 30px; font-family: var(--display); font-style: italic; font-weight: 300; font-size: 24px; line-height: 1.4; color: var(--bone-warm); max-width: 26ch; }
  .blurb em { color: var(--gold-bright); font-style: italic; }

  .trio { margin-top: 60px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .thumb { position: relative; padding: 22px 18px 22px; border: 1px solid rgba(227,183,109,0.18); border-radius: 8px; background: rgba(20,16,13,0.4); display: flex; flex-direction: column; align-items: center; }
  .thumb .cube { width: 100%; aspect-ratio: 5/4; background-size: 78% auto; }
  .thumb .name { margin-top: 10px; font-family: var(--display); font-style: italic; font-weight: 400; font-size: 19px; color: var(--bone); text-align: center; }
  .thumb .name .reg { font-style: normal; }
  .thumb .ka { margin-top: 4px; font-family: var(--ka); font-style: italic; font-weight: 500; font-size: 14px; color: var(--gold); text-align: center; }

  .foot { margin-top: auto; padding-top: 28px; display: flex; justify-content: space-between; align-items: center; }
  .foot .l { font-family: var(--body); font-size: 12px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--ash); font-weight: 600; }
  .foot .r { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 20px; color: var(--bone-warm); }
</style>
</head>
<body>
<div class="slide">
  <div class="frame"></div>
  <div class="body">
    <div class="top"><div class="hair"></div><span class="eyebrow">menu · მენიუ</span></div>
    <h1 class="head"><span class="it">Three</span><span class="reg">cubes<span class="stop">.</span></span></h1>
    <p class="ka-sub ka">სამი ხელწერა.</p>
    <p class="blurb">One cocktail per bite. <em>Hand-set</em> in Tbilisi — swipe to taste.</p>

    <div class="trio">
      <div class="thumb"><div class="cube walnut"></div><div class="name"><span class="reg">Churchkhela</span> Cream</div><div class="ka ka">ჩურჩხელის კრემი</div></div>
      <div class="thumb"><div class="cube lime"></div><div class="name"><span class="reg">Honey</span> Lemon</div><div class="ka ka">თაფლი-ლიმონი</div></div>
      <div class="thumb"><div class="cube saperavi"></div><div class="name"><span class="reg">Red</span> Wine Berry</div><div class="ka ka">წითელი ღვინო-კენკრა</div></div>
    </div>

    <div class="foot">
      <span class="l">swipe →</span>
      <span class="r">@she_zhuzhu_ndi</span>
    </div>
  </div>
</div>
</body>
</html>

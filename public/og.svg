<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="85%" cy="-10%" r="65%">
      <stop offset="0%" stop-color="#c69859" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c69859" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="-10%" cy="110%" r="70%">
      <stop offset="0%" stop-color="#8a1f3c" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#8a1f3c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0706"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Teardrop monogram, top-right -->
  <g transform="translate(1040 80)">
    <path d="M40 12 C 18 36 18 60 40 70 C 62 60 62 36 40 12 Z"
          fill="none" stroke="#c69859" stroke-width="2.4" stroke-linejoin="round"/>
    <circle cx="40" cy="52" r="3" fill="#c69859"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="350"
        font-family="Spectral, Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="300" font-size="220"
        fill="#ede1c4" letter-spacing="-6">zhuzhu</text>

  <!-- Tagline -->
  <text x="84" y="430"
        font-family="Spectral, Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="400" font-size="40"
        fill="#e3d3ab" letter-spacing="0">Cocktail desserts. Set by hand, in Tbilisi.</text>

  <!-- Footer rule -->
  <line x1="80" y1="540" x2="1120" y2="540"
        stroke="#c69859" stroke-opacity="0.32" stroke-width="1"/>

  <!-- Bottom row -->
  <text x="80" y="585"
        font-family="Manrope, 'Helvetica Neue', Arial, sans-serif"
        font-weight="600" font-size="20" fill="#c69859"
        letter-spacing="4">ZHUZHU.GE</text>
  <text x="1120" y="585" text-anchor="end"
        font-family="Manrope, 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="20" fill="#b3a48a"
        letter-spacing="4">TBILISI · 2024</text>
</svg>

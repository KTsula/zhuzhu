<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ZhuZhu · Saperavi · 04</title>
<link rel="stylesheet" href="../shared.css"/>
<style>
  /* Order — stamp-style CTA, distinct from Post 1's URL card. */
  .body { padding: 130px 96px 100px; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .head { margin-top: 50px; font-family: var(--display); font-size: 112px; line-height: 0.95; letter-spacing: -0.024em; }
  .head .it { font-style: italic; font-weight: 300; color: var(--bone-warm); display: block; }
  .head .reg { font-weight: 400; color: var(--bone); display: block; }
  .stop { color: var(--gold-bright); }
  .ka-sub { margin-top: 24px; font-family: var(--ka); font-style: italic; font-weight: 500; font-size: 40px; color: var(--gold); line-height: 1.05; }

  .order { margin-top: 46px; display: flex; flex-direction: column; gap: 0; border-top: 1px solid rgba(227,183,109,0.22); border-bottom: 1px solid rgba(227,183,109,0.22); }
  .order .row { display: flex; justify-content: space-between; padding: 22px 0; border-bottom: 1px solid rgba(227,183,109,0.12); }
  .order .row:last-child { border-bottom: 0; }
  .order .l { font-family: var(--body); font-size: 12px; text-transform: uppercase; letter-spacing: 0.32em; color: var(--ash); font-weight: 600; }
  .order .v { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 24px; color: var(--bone); }
  .order .v .accent { color: var(--gold-bright); }

  .stamp { margin-top: 40px; display: flex; align-items: stretch; border: 1px solid rgba(227,183,109,0.40); border-radius: 12px; overflow: hidden; }
  .stamp .left { flex: 1; padding: 30px 36px; background: rgba(227,183,109,0.08); }
  .stamp .left .label { font-family: var(--body); font-size: 11px; text-transform: uppercase; letter-spacing: 0.32em; color: var(--ash); font-weight: 600; }
  .stamp .left .url { margin-top: 6px; font-family: var(--display); font-style: italic; font-weight: 300; font-size: 52px; color: var(--gold-bright); line-height: 1; }
  .stamp .right { flex: 0 0 130px; background: var(--bone); color: var(--night); display: flex; align-items: center; justify-content: center; font-family: var(--display); font-style: italic; font-weight: 400; font-size: 28px; letter-spacing: 0.02em; }

  .foot { margin-top: auto; padding-top: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
  .foot .left { display: flex; align-items: center; gap: 14px; }
  .foot .mark-sm { width: 68px; height: 68px; background: url("../assets/logo-transparent.png") center/contain no-repeat; }
  .foot .meta { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 18px; color: var(--ash); }
</style>
</head>
<body>
<div class="slide">
  <div class="frame"></div>
  <div class="body">
    <div class="top"><span class="eyebrow">order · Tbilisi delivery</span></div>
    <h1 class="head"><span class="it">Set the</span><span class="reg">night<span class="stop">.</span></span></h1>
    <p class="ka-sub ka">დაჯავშნე ღონისძიება.</p>

    <div class="order">
      <div class="row"><span class="l">Set</span><span class="v">the day before</span></div>
      <div class="row"><span class="l">Delivery</span><span class="v">chilled · <span class="accent">within Tbilisi</span></span></div>
      <div class="row"><span class="l">Reply</span><span class="v">within one working day</span></div>
    </div>

    <div class="stamp">
      <div class="left">
        <div class="label">site</div>
        <div class="url">zhuzhu.ge</div>
      </div>
      <div class="right">order →</div>
    </div>

    <div class="foot">
      <div class="left"><div class="mark-sm"></div><span class="meta">@she_zhuzhu_ndi</span></div>
      <span class="meta">hand-set in Tbilisi</span>
    </div>
  </div>
</div>
</body>
</html>

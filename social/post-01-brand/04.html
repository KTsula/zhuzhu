<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ZhuZhu · Brand · 04</title>
<link rel="stylesheet" href="../shared.css"/>
<style>
  /* CTA — vertical stack with handles list and big URL card. */
  .body { padding: 130px 100px 110px; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .head { margin-top: 50px; font-family: var(--display); font-size: 108px; line-height: 0.95; letter-spacing: -0.022em; }
  .head .it { font-style: italic; font-weight: 300; color: var(--bone-warm); display: block; }
  .head .reg { font-weight: 400; color: var(--bone); display: block; }
  .stop { color: var(--gold-bright); }
  .ka-sub { margin-top: 26px; font-family: var(--ka); font-style: italic; font-weight: 500; font-size: 38px; line-height: 1.1; color: var(--gold); }

  .url-card { margin-top: 60px; border: 1px solid rgba(227,183,109,0.32); border-radius: 10px; padding: 32px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(20,16,13,0.5); }
  .url-card .left { display: flex; flex-direction: column; gap: 6px; }
  .url-card .label { font-family: var(--body); font-size: 11px; text-transform: uppercase; letter-spacing: 0.32em; color: var(--ash); font-weight: 600; }
  .url-card .url { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 52px; color: var(--gold-bright); letter-spacing: 0.005em; line-height: 1; }
  .url-card .arrow { font-family: var(--display); font-weight: 300; font-size: 48px; color: var(--gold); }

  .handles { margin-top: 32px; display: flex; gap: 0; flex-direction: column; }
  .handle-row { display: flex; justify-content: space-between; align-items: baseline; padding: 18px 4px; border-bottom: 1px solid rgba(227,183,109,0.16); }
  .handle-row:last-child { border-bottom: 0; }
  .handle-row .ch { color: var(--ash); text-transform: uppercase; letter-spacing: 0.28em; font-weight: 600; font-size: 12px; }
  .handle-row .at { font-family: var(--display); font-style: italic; font-weight: 300; color: var(--bone-warm); font-size: 22px; letter-spacing: 0.005em; }

  .foot { margin-top: auto; padding-top: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
  .foot .left { display: flex; align-items: center; gap: 14px; }
  .foot .mark-sm { width: 68px; height: 68px; background: url("../assets/logo-transparent.png") center/contain no-repeat; }
  .foot .meta { font-family: var(--display); font-style: italic; font-weight: 300; font-size: 18px; color: var(--ash); }
</style>
</head>
<body>
<div class="slide">
  <div class="frame"></div>
  <div class="body">
    <div class="top"><span class="eyebrow">find us</span></div>
    <h1 class="head"><span class="it">Book your</span><span class="reg">night<span class="stop">.</span></span></h1>
    <p class="ka-sub ka">დაჯავშნე ღონისძიება.</p>

    <div class="url-card">
      <div class="left">
        <span class="label">site</span>
        <span class="url">zhuzhu.ge</span>
      </div>
      <span class="arrow">→</span>
    </div>

    <div class="handles">
      <div class="handle-row"><span class="ch">Instagram</span><span class="at">@she_zhuzhu_ndi</span></div>
      <div class="handle-row"><span class="ch">TikTok</span><span class="at">@she_zhuzhu_ndi</span></div>
      <div class="handle-row"><span class="ch">Facebook</span><span class="at">ZhuZhu · ჟუჟუ</span></div>
    </div>

    <div class="foot">
      <div class="left"><div class="mark-sm"></div><span class="meta">hand-set in Tbilisi</span></div>
      <span class="meta">© 2026</span>
    </div>
  </div>
</div>
</body>
</html>
